  (PK voter_id+city_id — already deployed in the new shape, no SQL needed).
  New token system (#FF8C42 accent, grade colors), 160ms transitions,
  / → /cities redirect. Deleted: Trip dashboard, /vote flow, /dates,
  WalkStrip, ConstellationMap, CityCard, HotelCard, VenueRow, VoterAvatars,
  Stars, score.ts, geo.ts. Build green (34 static pages), lint + strict
  typecheck clean, all routes smoke-tested.
