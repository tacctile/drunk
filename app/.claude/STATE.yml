last_session: >-
  Prompt 3 — the profile overlay. New components/ProfileOverlay.tsx: a
  full-screen slide-up sheet (anim-sheet, --bg, z-50 over the tab bar, NO
  route) opened by the AppShell avatar; own header (back arrow / "Profile"
  / spacer) closing on tap, Escape, or a 70px header swipe-down; body
  scroll locked; content + hooks mount only while open. Sections: 64px
  pin-color avatar + display name + "Member since [date]"
  (v2_voters.created_at, fetched per open alongside pin_hash); MY VOTE
  card (city + "You voted for this city" + "Preferred hotel: X", or "No
  vote cast yet" + "Go vote" → closes overlay, pushes /cities); MY
  AVAILABILITY card ("[N] days available" green / "[N] days unavailable"
  red / "Last updated [Month Year]", or "No dates marked yet" + "Mark
  dates" → /calendar); LOCATION SHARING card (toggle on
  useLocations.toggleSharing, "Sharing · expires in X hrs" / "Not
  sharing", "This only affects Bar Hoppers." disclaimer); MY IDENTITY
  confirm-then-change form (three always-shown confirmation inputs — PIN
  masked w/ eyeball, bcrypt-compared against pin_hash; trimmed
  case-insensitive matches gate "Update my profile", which reveals three
  optional double-entry change pairs; empty pair = untouched field; "Save
  changes" → useGroupData.updateProfile, 1.2s green check flash, form
  reset); "Not [name]? Switch identity" → BottomSheet confirm → new
  useGroupData.signOut (clears bh2-voter-id/-name/-pin-color + write
  caches, context → unregistered, server rows remain) and the overlay
  closes. Unregistered avatar taps get a "No identity yet" gate into
  NamePrompt. Data layer: updateProfile (optimistic rename of context
  name + roster row + bh2-voter-name; v2_voters upsert adds pin_hash +
  pin_plain when the PIN changed), signOut, identity.clearIdentity();
  useLocations channel topic is now unique per mount so /locate and the
  overlay can subscribe simultaneously. Schema: v2_voters.pin_plain text
  added live via MCP (idempotent; recovery-only — nothing verifies
  against it). Voting/availability writes, city list/detail, Results,
  admin, locate map logic, root index.html untouched. Build green (36
  static pages), lint + strict typecheck clean.
