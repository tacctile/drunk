last_session: >-
  Six surgical fixes on the Locate screen + city detail header. (1) The
  "Location Options" BottomSheet replaced by a centered Dialog modal with
  DRAFTED edits — pendingSharing/pendingMuted copy live values on open
  (modal mounts fresh per open), the mute list follows the draft toggle,
  nothing writes until Save (mutes first, then toggleSharing if moved);
  Cancel/Esc/scrim discards; denied/error keeps the modal open with the
  inline error and reverts the draft toggle; mute rows scroll past 35vh.
  (2) People-panel rows keep per-person pin_color fill + contrastColor
  text; own row now appends " (you)" and wears a 1.5px
  rgba(255,255,255,.4) inset outline instead of the --ink border. (3)
  "Show All" is position:sticky top-0 inside the scrollable list
  (bg-raised, border-b) — never scrolls away. (4) Strip is collapsible: a
  44px "Hide" bar (chevron_right + label, --ink-dim, bg-raised, border-t)
  collapses width to 0 (200ms ease, aria-hidden, pointer-events-none); a
  28x56px floating chevron_left handle (raised @90%, --border, radius
  6px 0 0 6px) vertically centered on the map's right edge re-expands.
  (5) Floating pills unified at 8px — /cities sort pill rounded-full →
  rounded-btn (vote CTA + options pill already 8px). (6) ProfileAvatar
  extracted to components/ProfileAvatar.tsx (optional className prop;
  AppShell passes -mr-1) and the city-detail header's vote icon REPLACED
  by it with its own ProfileOverlay mount — avatar persists everywhere
  except /admin; voting on city detail is ActionBar-only now. (7) Own map
  pin's outer ring: scale 13 (26px) stroked in YOUR pin_color (was
  hardcoded amber, 22px), icon re-set in place on realtime ticks — zero
  hardcoded locate pin colors. useLocations, voting, availability, city
  list walkability, Results, admin, map options/dark style, root
  index.html untouched. Build green (36 static pages), lint + strict
  typecheck clean.
