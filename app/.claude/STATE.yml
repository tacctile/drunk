last_change: >
  audit-fix: Rebuilt the 3s admin long-press hold mechanic from scratch after
  two prior attempts still failed on device. useAdminHold.ts now uses Pointer
  Events only: onPointerDown starts a 3000ms setTimeout; on fire it calls
  router.push(destination) directly and sets a module-level didFire flag;
  onPointerUp/onPointerLeave/onPointerCancel clear the timer. Removed onClick,
  firedRef, e.preventDefault, onContextMenu, draggable, and all mouse/touch
  handlers from the hook — it returns { holding, handlers } where handlers is
  { onPointerDown, onPointerUp, onPointerLeave, onPointerCancel }. PlanNav and
  HopNav now spread {...adminHold.handlers} on every nav button and handle
  normal navigation with a SEPARATE onClick={() => router.push(href)} — no
  conflict because the hold mechanic no longer touches onClick. ProfileAvatar
  (third consumer, 500ms moderator hold) updated to the same separated pattern
  to keep TypeScript green. Opacity pulse (anim-hold) preserved on all tabs.

