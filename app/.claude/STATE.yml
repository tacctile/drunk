last_updated: 2026-06-12
last_session: >-
  Locate screen layout rebuilt. The bottom drawer (drag handle, 80px↔50vh
  panel height state, pointer drag handlers, row flash) and the inline
  controls card are completely deleted. The registered screen is now a
  fixed flex column (under the header → above the bottom nav): a full-bleed
  dark map (same options: Ralston center, zoom 8, greedy gestures,
  disableDefaultUI, clickableIcons false) with a right-side people strip
  overlaid absolute right-0 inset-y-0 (120px / 160px ≥640px,
  rgba(10,13,20,.85) bg, --border left hairline) — pinned 44px "Show All"
  row on top (--surface-raised, zoom_out_map + accent 12px/600 text; 0
  sharers no-op, 1 panTo + zoom 14, 2+ fitBounds w/ 40px padding) over a
  scrollable A–Z list of active sharers (44px rows filled with their
  pin_color, contrastColor() text, own row 1.5px --ink border, tap →
  pan/zoom 15 + 400ms pin pulse; empty state "No one sharing"). Map pins
  are clickable:false now that the drawer's row-highlight is gone. Below
  the map, in normal flow, the single "Location Options" pill (btn-ghost,
  44px, tune icon) opens a BottomSheet with a close button: SHARING
  (toggle + disclaimer + inline denied/error copy) and, while sharing is
  on, "Who can see me" — every other registered user A–Z with a 16px
  pin_color dot and a "Hide from [name]" toggle wired to muted_ids. No
  Save/Cancel — writes stay immediate/optimistic. Registration gate and
  useLocations untouched. AppShell, voting, availability, city
  list/detail, Results, admin, root index.html untouched. Build green (36
  static pages), lint + strict typecheck clean.
