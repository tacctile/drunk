last_session: >-
  City detail map: tap-to-focus, Show All, your-location dot; sharing
  default ON synced across Locate + Profile. (1) Venue pins grew to scale
  9 / 18px (zIndex 10); first pin placement fitBounds all pins w/ 60px
  padding (1 pin → panTo + zoom 16, 0 pins → city center/zoom stands).
  (2) Venue rows (all three tabs) are tap targets — the info block is now
  a real button, sibling of the hotel star toggle; a row with coords
  flashes --surface-raised 300ms, pans the map to its pin, zooms 16,
  grows the pin to scale 13 / stroke 3 / zIndex 11 and resets all others;
  no coords = inert. Page scrolls only if the map is off-screen
  (scrollIntoView block:nearest, 57px scroll-margin under the sticky
  header). CityMap is forwardRef w/ CityMapHandle.focusVenue. (3)
  Floating 44px Show All button top-right inside the map (zoom_out_map,
  raised + border, rounded-btn, rendered once the map loads): fitBounds
  all venue pins + clears focus. (4) Your own dot via watchPosition on
  map mount — 22px scale 11, bh2-pin-color fill (?? #FF8C42), white 2.5px
  stroke, contrastColor initials label, "You" title, zIndex 20, moves
  with you, cleared on unmount, denied = silent, never in Show All
  bounds. getInitials centralized in lib/colors.ts (ProfileAvatar +
  ProfileOverlay dupes deleted). (5) useLocations auto-start (sharing ON
  by default) now gated to registered identities (name +
  !identityInvalid) — unregistered mounts no longer attempt toggleSharing
  or burn bh2-sharing-preference="false"; attempt guard keyed per voter
  id at module scope. (6) Sharing state is one source of truth: rows +
  mute list + in-flight intent moved to a module-scoped shared store in
  useLocations.ts — Locate screen and Profile overlay render the same
  data and a toggle anywhere reflects everywhere in the same frame, even
  with realtime down. muted_ids stays empty-by-default (visible to
  everyone; verified no defensive filtering). bh2-sharing-preference
  added to the localStorage contract (nine keys). Locate map/UI, admin,
  Results, calendar, walkability, voting, root index.html untouched.
  Build green (36 static pages), lint + strict typecheck clean.
