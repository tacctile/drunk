last_session: >-
  Locate tab + hidden Admin screen. Nav has FOUR tabs (Locate rightmost,
  person_pin, /locate); a 3-second long-press on the Locate item — mobile
  bar or desktop rail — opens /admin (the ONLY entry point) with an
  opacity 1→0.5→1 pulse across the hold; normal taps still go to /locate
  and the post-hold release click is swallowed. /locate gates on a
  registered identity (stored voter id verified against the roster;
  otherwise "Identity required" card → NamePrompt), then renders a
  full-screen dark map (Ralston 41.172/-96.1358, zoom 8, greedy) fed by a
  v2_locations realtime subscription with expired rows and rows muting the
  viewer filtered out; other people are 14px pins + name pills, own pin is
  18px + 22px amber ring + "You (name)". Controls: opt-in "Share my
  location" toggle (OFF by default, disclaimer "This only affects Bar
  Hoppers. Your device location settings are unchanged.", denied permission
  → inline error + toggle stays off, ON → upsert with expires_at now()+72h
  and a 60s coord updater that only auto-resumes when permission is already
  granted, OFF → row deleted), 10-swatch pin color picker (persists to
  bh2-pin-color), one-directional mute list under "Manage visibility"
  (muted_ids on my row, mirrored to bh2-muted-ids while not sharing).
  People panel: draggable bottom sheet 80px ↔ 50% viewport, 56px rows
  (dot/name/"Last updated X min ago", self first "(you)"), pin tap
  highlights the row, row tap pans+zooms (14) and pulses the pin. /admin:
  registered-user cards (eye reveals hashed-PIN status — never a PIN; edit
  modal renames, optionally resets PIN with confirm, cascade-deletes the
  user across votes/availability/locations), Reset All Votes + Reset All
  Availability behind red confirm modals, active-location list with Force
  expire, and a data-health count grid with refresh. Supabase: v2_locations
  created live via MCP (anon read only while expires_at > now(), anon
  write/update/delete, in supabase_realtime; idempotent SQL safe to
  re-run). New files: locate/page.tsx, admin/page.tsx, useLocations.ts.
  localStorage grew to eight bh2-* keys. No voting, availability, city,
  or board logic touched. Build green (36 static pages), lint + strict
  typecheck clean.
