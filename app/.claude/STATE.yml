last_updated: 2026-06-12
last_session: >-
  Auto-assigned pin color system (identity foundation). New lib/colors.ts:
  25-color PIN_COLORS pool, assignColor(n) = PIN_COLORS[n % 25] (Nth
  registered voter gets the Nth color, cycling past 24), contrastColor(hex)
  for avatar initials (consumed in Prompt 2). Schema applied live via MCP
  (add_pin_color_to_v2_voters, idempotent): v2_voters.pin_color text NOT
  NULL DEFAULT '#FF8C42'; the 4 pre-existing voters were backfilled with
  pool colors in created_at order so registration-order assignment holds
  for everyone. createIdentity now COUNTs v2_voters and upserts pin_color =
  assignColor(count) with the bcrypt hash, then caches the color to
  bh2-pin-color; signIn selects pin_color and caches it after PIN
  verification; refetch re-syncs the cache from my server row (server truth
  wins — stale picker-era colors retire themselves). VoterRow gained
  pin_color: string and the roster select includes it — useGroupData
  consumers can render colored circles next to names. Color picker DELETED
  everywhere: PIN_PALETTE, DEFAULT_PIN_COLOR, updatePinColor, and all
  bh2-pin-color writes removed from useLocations.ts; the swatch radiogroup
  removed from locate/page.tsx (only change there); toggleSharing writes
  v2_locations.pin_color from the bh2-pin-color cache ?? '#FF8C42'.
  bh2-pin-color stays in the localStorage contract as an identity-layer
  cache of the server-assigned color — never a user pick. ensureVoter
  intentionally omits pin_color (insert takes the default, conflict update
  preserves the assignment). The task spec's example upsert listed a
  pin_plain field — intentionally NOT implemented (no such column; plain
  PINs are forbidden by the architecture). AppShell, voting, availability,
  city data, admin, root index.html untouched. Build green (36 static
  pages), lint + strict typecheck clean.
current_phase: pin_color_foundation
build_complete: true
supabase_schema_deployed: true
vercel_deployed: false
known_issues:
  - Venue lat/lng are all NULL until backfilled — the city map renders zero
    pins until then (expected and correct per spec)
  - Venue list order relies on physical insertion order (no ORDER BY per
    spec); Postgres doesn't guarantee it — UPDATEs (e.g. the lat/lng
    backfill) may visibly reorder lists
  - Legacy v2_voters rows have no pin_hash — the first PIN entered for that
    name in the sign-in form silently becomes their PIN
  - Pre-existing v2_hotel_votes rows keyed by Google place_ids no longer
    match the uuid-keyed hotel toggles (they still count on The Board, which
    groups hotel votes by hotel_name)
  - Board hotel rows join v2_hotels by exact hotel_name match — renamed or
    sub-3-star hotels show no stars and sort last on the price tie-breaker
  - The 32px "See Votes"/"See Who" buttons are below the app's 44px tap
    floor — explicit spec exceptions
  - Two devices registering at the same instant can read the same COUNT(*)
    and receive the same pin color (no server-side sequence; acceptable for
    ~10 friends, and colors repeat past 25 by design anyway)
  - Devices already signed in keep a stale bh2-pin-color until their first
    roster refetch after this deploy overwrites it with the server-assigned
    color (self-healing, no action needed)
  - Location coords only refresh while a Bar Hoppers tab is open (60s
    foreground interval — no background tracking, by design); a row from a
    closed session keeps its last coords until expiry or toggle-off
  - Anyone can long-press into /admin — it is hidden, not authenticated
    (acceptable for a ~10-friend app, per spec)
