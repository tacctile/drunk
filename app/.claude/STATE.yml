known_issues:
  - Venue lat/lng are all NULL until backfilled — the city map renders zero
    pins until then (expected and correct per spec)
  - Venue list order relies on physical insertion order (no ORDER BY per
    spec); Postgres doesn't guarantee it — UPDATEs (e.g. the lat/lng
    backfill) may visibly reorder lists
  - Legacy v2_voters rows have no pin_hash — the first PIN entered for that
    name in the sign-in form silently becomes their PIN
  - Pre-existing v2_hotel_votes rows keyed by Google place_ids no longer
    match the uuid-keyed hotel toggles (they still count on The Board, which
    groups hotel votes by hotel_name)
  - Board hotel rows join v2_hotels by exact hotel_name match — renamed or
    sub-3-star hotels show no stars and sort last on the price tie-breaker
  - The 32px "See Votes"/"See Who" buttons and the 32px pin-color swatches
    are below the app's 44px tap floor — explicit spec exceptions
  - Location coords only refresh while a Bar Hoppers tab is open (60s
    foreground interval — no background tracking, by design); a row from a
    closed session keeps its last coords until expiry or toggle-off
  - Anyone can long-press into /admin — it is hidden, not authenticated
    (acceptable for a ~10-friend app, per spec)
