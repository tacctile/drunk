last_updated: 2026-06-12
last_session: >-
  Admin hardening + back-nav fixes (four targeted fixes). (1)
  ProfileOverlay intercepts the device/browser back button: opening pushes
  a dummy { profile: true } history entry + popstate listener so Android
  back / browser back closes the overlay instead of leaving the app;
  in-app closes (back arrow / Escape / header swipe / sign-out) pop the
  dummy entry via history.back() to keep the stack clean; Go vote / Mark
  dates router.replace the dummy entry with the destination (popping
  first would race the push). (2) Admin user cards are always
  plain-visible — eyeball toggle and reveal state deleted; each card shows
  display name, "PIN: [pin_plain]" or "PIN not set", "Last voted: [city]"
  or "No vote", 44px pencil edit + new 44px red delete button; the edit
  modal's PIN reset now also writes pin_plain so the displayed PIN stays
  truthful, and its embedded delete flow moved out to the row button. (3)
  Cascade delete fixed at the root: v2_voters had NO anon DELETE RLS
  policy (only v2 user table without one) so the voter row silently
  survived — policy added live via MCP (allow_anon_delete_v2_voters);
  deleteUser deletes explicitly in FK order v2_locations → v2_availability
  → v2_hotel_votes → v2_city_votes → v2_voters, each awaited, then
  refetches without reload; confirm dialog (Cancel / red Delete) stays.
  (4) Admin scroll fixed at the root: the save-and-restore body scroll
  lock left body overflow stuck on "hidden" when stacked overlays
  unmounted in one commit — Dialog/BottomSheet/ProfileOverlay now share a
  counter-based lock (new lib/scrollLock.ts); admin content wrapper gained
  pb-32 so the last section clears the bottom nav. (5) New DANGER ZONE
  section below DATA HEALTH: red-bordered "Wipe All Users" (warning icon)
  opens a BottomSheet with a "Type DELETE to confirm" input
  (autoCapitalize, no autocorrect/autocomplete), text Cancel, and a red
  filled "Wipe Everything" disabled until the input === "DELETE"
  (case-sensitive); confirming wipes the five user tables in the same FK
  order (.neq nil-uuid), closes the sheet, refetches, and shows "All
  users wiped." centered in the users section for 4s. Voting,
  availability calendar, city list/detail, Results, locate, root
  index.html untouched. Build green (36 static pages), lint + strict
  typecheck clean.
