last_change: >
  audit-fix: Fixed admin long-press not navigating to /plan/admin. Root cause:
  NAV items in PlanNav (desktop rail + mobile bar) and HopNav were <Link>
  elements with adminHold.handlers spread on them. After the 3s hold fires and
  router.push('/plan/admin') is called, the subsequent synthetic click event on
  the Link still triggers Next.js navigation to the tab's own href, overriding
  the admin navigation. Fix: converted all NAV <Link> items to <button> elements
  using the same router.push pattern already used by the Hopp/Plan cross-wing
  buttons — holdClick(e) is called first; if not preventDefault'd, router.push
  navigates to the tab's href. Normal taps work; hold taps swallow the click and
  go to /plan/admin. Opacity pulse (anim-hold) preserved on all tabs.

last_session: "audit-fix: fix admin long-press nav on all tabs"

