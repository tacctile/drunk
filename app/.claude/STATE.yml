last_updated: 2026-06-12
last_session: >-
  Venue data layer flipped to Supabase-primary. v2_hotels/v2_bars/v2_food
  are now the ONLY source for venue lists (usePlaces.ts deleted, new
  useVenues.ts; Places Nearby Search + chain filter removed; the Maps JS
  loader no longer loads the places library). Google APIs now serve only
  the map display and background Geocoding of pin coordinates (venue name +
  address, 3 concurrent, one OVER_QUERY_LIMIT retry, session-cached, silent
  skip on failure — lists never wait on pins). ALL external links removed:
  venue addresses are plain text in rows and the pin sheet; mapsUrl /
  priceSymbols / formatTypes / isChain deleted; zero target="_blank" in the
  app. Hotel rows render filled accent star icons (stars) + price_range;
  bar/food rows render the curated descriptor + "Also serves food" /
  "Full bar" pills (has_food/has_bar). City detail sticky header is now
  fully opaque (bg-bg — no /90 opacity, no backdrop-blur). /cities gained a
  36px sticky column header (CITY/WALKABILITY/DISTANCE/VOTE) below the
  wordmark bar, aligned to a fixed 96px walkability column in the rows.
  Map pins diff by venue id (stream in as geocodes resolve) and carry
  zoom-gated OverlayView name labels (zoom >= 15, edge-flipping pills,
  pointer-events none). Hotel preference voting logic untouched — ids are
  now v2_hotels uuids. Build green (34 static pages), lint + strict
  typecheck clean.
