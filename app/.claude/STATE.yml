last_updated: 2026-06-12
last_session: >-
  Admin user disable/enable, disabled users excluded from all group views,
  single-device location broadcasting. SCHEMA SQL PENDING MANUAL RUN
  (v2_voters.is_active boolean NOT NULL DEFAULT true; v2_locations.
  session_id uuid — idempotent block in CONTEXT.md migration log; until it
  runs the v2_voters selects naming is_active fail and group data falls
  back local-only/empty). (1) Admin user cards: Active/Disabled chip
  toggle (optimistic, no confirm); disabling sets is_active false and
  deletes the live v2_locations row; disabled cards opacity-60; nothing
  else deleted — re-enable restores all contributions instantly. (2)
  Filter pattern everywhere group-facing: roster select carries
  is_active; aggregations drop rows whose voter is KNOWN inactive
  (is_active === false), personal values unfiltered. useVotes ranking/
  counts/tags/hotel tallies/totalVotes filtered (myCityId/myHotelPrefFor/
  hasVoted not); useAvailability byDate/heat/hot dates/breakdowns/
  noResponse/rosterSize filtered (`mine` never); board leadingHotelPrefs
  (the one useVotes bypass) filtered; locate mute list hides disabled
  voters; useLocations.activeLocations drops their rows. Sign-in roster
  keeps disabled users on purpose — they can still use the whole app,
  their data stores but doesn't count. (3) Disabled sharing lock:
  useLocations.amDisabled (reactive via roster realtime + focus refetch)
  blocks toggle-ON and auto-start, tears down a live row via the off
  branch, and grays out the sharing Switch (opacity .4, pointer-events
  none) in the Locate options modal AND profile overlay with "Location
  sharing disabled by admin." (4) Single-device broadcast: toggle-ON
  mints a fresh uuid → bh2-session-id (tenth localStorage key) + row
  session_id; the 60s tick SELECTs the row's session_id first and stops
  pushing on mismatch (newest activation wins); coord UPDATEs guarded
  .eq(session_id) so stale devices can't win races; no stored id pairs
  with NULL session_id so legacy sharers keep working. Toggle-OFF from
  any device still deletes the row = stops every device. VoterRow +
  is_active, LocationRow + session_id. City detail map, walkability,
  AppShell, root index.html untouched. Build green (36 static pages),
  lint + strict typecheck clean.
