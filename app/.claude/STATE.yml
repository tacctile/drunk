last_updated: 2026-06-12
last_session: >-
  Foundation fixes. Identity is now name + last initial + 2-digit PIN:
  NamePrompt fully replaced with a four-step flow — new user (first name
  1–15 chars + single-letter last initial → choose/confirm 2-digit PIN) and
  return user ("I have an account" link, or auto-shown via IdentityWatcher
  when the stored voter_id can't be verified against the live roster) with
  an A–Z roster dropdown + PIN check. PINs are bcrypt-hashed (bcryptjs,
  10 salt rounds) into v2_voters.pin_hash — never plain text; display_name
  ("Nick B") added alongside name (kept equal for backward compat). Wrong
  PIN → "That PIN doesn't match. Try again." — no lockout. Legacy rows
  without a pin_hash adopt the first PIN entered for them on sign-in.
  Identity switch (sign-in or new account via "Not you?" on The Board)
  generates/loads a voter_id into bh2-voter-id, clears this device's
  vote/availability caches, and refetches. saveName and the bootstrap
  roster upsert are gone (createIdentity / signIn / identityInvalid on
  useGroupData instead); ensureVoter never touches pin_hash. Schema
  migration applied live via Supabase MCP (idempotent SQL also recorded in
  CONTEXT.md): v2_voters +pin_hash +display_name, v2_hotels/v2_bars/v2_food
  +lat +lng (nullable float8). Venue queries: hotels now gte(stars,3) (all
  56 live rows qualify), ORDER BY removed everywhere, still no LIMIT —
  insertion order is canonical. ALL geocoding deleted from useVenues/maps —
  CityMap reads venue.lat/venue.lng, null = silently no pin (map sparse
  until coords backfilled — expected). City detail: venue address +
  descriptor wrap (break-words, truncate removed); hotel preference radios
  replaced by a 44px star toggle (outline FILL 0 + "PREFER" label →
  filled FILL 1 accent star alone). The Board rebuilt read-only two-column
  (stacks below 480px): STANDINGS left (rank / city / count / 4px accent
  meter / voter pills / hotel sub-rows), HOT DATES right (dates by
  available count desc, "X available", available/roster meter, name pills);
  heat calendar + day breakdown sheet removed from the board (HeatCalendar
  stays exported from Calendar.tsx, now unused; calendar tab untouched).
  bcryptjs ^3.0.3 added. Build green (34 static pages), lint + strict
  typecheck clean.
current_phase: pin_identity_foundation
