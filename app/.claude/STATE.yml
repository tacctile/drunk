last_change: >
  audit-fix: Fixed /plan/admin redirecting away after the long-press because
  the bh2-role cookie was not yet super_admin at navigation time. Middleware
  now ALSO allows the hardcoded superadmin through independent of the role
  cookie: the /plan/admin guard passes when roleCookie === "super_admin" OR a
  bh2-voter-id cookie equals "00000000-0000-0000-0000-000000000001". auth.ts
  gained mirrorVoterIdCookie(voterId) (same pattern as mirrorAuthCookie —
  writes bh2-voter-id into a SameSite=Lax cookie; not a security boundary).
  useGroupData's bootstrap useEffect calls mirrorVoterIdCookie(id) immediately
  after getVoterId() so the cookie always tracks localStorage. The role cookie
  path is unchanged for moderators and non-superadmin users.

