known_issues:
  - App icons are placeholders — public/icons/ needs real PNGs
    (icon-192.png, icon-512.png, apple-touch-icon.png) before install looks right.
  - bh2-auth is a session cookie, so a cold direct deep-link to /plan/* in a new
    browser session bounces through /login → /home once before the cookie is set.
    Intended soft-guard behavior, not a bug.
  - VAPID keys not yet generated — run npx web-push generate-vapid-keys and add
    to .env.local + Vercel env vars before push notifications will work.
